<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webnotes</title>
    <meta name="description" content="Practical learning notes for web development, programming, and tech concepts.">
    <meta name="author" content="Webnotes">
    <link rel="canonical" href="https://webnotes.site/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Webnotes">
    <meta property="og:description"
        content="Practical learning notes for web development, programming, and tech concepts.">
    <meta property="og:url" content="https://webnotes.site/">
    <meta property="og:image" content="https://webnotes.site/content/assets/og-default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Webnotes">
    <meta name="twitter:description"
        content="Practical learning notes for web development, programming, and tech concepts.">
    <meta name="twitter:image" content="https://webnotes.site/content/assets/og-default.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f3f0;
            --text: #000000;
            --accent: rgb(0, 119, 255);
            --border: 3px solid #000;
            --shadow: 4px 4px 0px #000;
            --white: #ffffff;
        }

        body {
            font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: var(--text);
            background-color: var(--bg);
            font-weight: 500;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 50px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            border: var(--border);
            padding: 20px;
            background-color: var(--white);
            box-shadow: var(--shadow), inset 0 0 0 2px #000;
            transform: rotate(-1deg);
        }

        .course-list {
            list-style: none;
            background-color: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 10px;
        }

        .course-list li {
            margin-bottom: 10px;
        }

        .course-list li:last-child {
            margin-bottom: 0;
        }

        .course-list li a {
            display: block;
            padding: 20px 25px;
            text-decoration: none;
            color: var(--text);
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 2px solid #000;
            background-color: var(--bg);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .course-list li a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--accent);
            transition: left 0.3s ease;
            z-index: 0;
        }

        .course-list li a span {
            position: relative;
            z-index: 1;
        }

        .course-list li a:hover {
            color: #fff;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px #000;
        }

        .course-list li a:hover::before {
            left: 0;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            font-weight: 700;
            font-size: 1rem;
            border: var(--border);
            background-color: var(--white);
            box-shadow: var(--shadow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
                transform: rotate(-0.5deg);
            }

            .container {
                margin: 30px auto;
            }

            .course-list li a {
                padding: 15px 18px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>webnotes</h1>
        <ul class="course-list">
            <li><a href="content/comptia-a-220-1201/"><span>Comptia A 220 1201</span></a></li>
            <li><a href="content/comptia-network-plus/"><span>Comptia Network Plus</span></a></li>
            <li><a href="content/comptia-security-plus/"><span>Comptia Security Plus</span></a></li>
            <li><a href="content/ccna-200-301/"><span>Ccna 200 301</span></a></li>
        </ul>
        <footer>&copy; 2026 webnotes</footer>
    </div>
</body>

</html>
